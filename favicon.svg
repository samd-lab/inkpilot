<?xml version="1.0" encoding="UTF-8"?>
<!-- TattooDesignr — Favicon (simplified for 16x16 / 32x32 visibility) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background tile -->
  <rect width="32" height="32" rx="6" fill="#0e0f12"/>

  <!-- Bold ink drop (simplified, no gradient — solid for tiny sizes) -->
  <path d="M16 4
           C 10 10, 7 16, 7 21
           C 7 27, 11 30, 16 30
           C 21 30, 25 27, 25 21
           C 25 16, 22 10, 16 4 Z"
        fill="#1a1b1f"
        stroke="#fff"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Diagonal needle (red) -->
  <line x1="3" y1="29" x2="29" y2="3"
        stroke="#dc2626"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Red ink core -->
  <circle cx="16" cy="18" r="2" fill="#dc2626"/>
</svg>
