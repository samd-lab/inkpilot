<?xml version="1.0" encoding="UTF-8"?>
<!-- TattooDesignr — Logo Mark (icon only, no ring, optimized for inline use) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TattooDesignr">
  <defs>
    <linearGradient id="m_drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b1f"/>
      <stop offset="100%" stop-color="#0e0f12"/>
    </linearGradient>
    <linearGradient id="m_needle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Ink drop -->
  <path d="M32 4
           C 21 16, 14 28, 14 40
           C 14 53, 22 62, 32 62
           C 42 62, 50 53, 50 40
           C 50 28, 43 16, 32 4 Z"
        fill="url(#m_drop)"
        stroke="#fff"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- Needle line piercing -->
  <line x1="6" y1="58" x2="58" y2="6"
        stroke="url(#m_needle)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Needle tip -->
  <circle cx="58" cy="6" r="2.2" fill="#dc2626"/>

  <!-- Red core where needle meets ink -->
  <circle cx="32" cy="34" r="3.5" fill="#dc2626"/>
  <circle cx="32" cy="34" r="1.4" fill="#fff" opacity="0.95"/>
</svg>
